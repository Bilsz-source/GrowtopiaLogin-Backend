<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Growtopia</title>
    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
        }

        /* ----- VIDEO OVERLAY (full screen) ----- */
        #videoOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #videoOverlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #introVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        /* ----- COUNTDOWN OVERLAY ----- */
        #countdownDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px rgba(0, 0, 0, 0.9), 0 0 80px rgba(0, 0, 0, 0.7);
            pointer-events: none;
            font-family: 'Arial Black', sans-serif;
            opacity: 0.6;
            user-select: none;
            z-index: 10;
            animation: pulse 1s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.08);
                opacity: 0.8;
            }
        }

        /* ----- SOUND PROMPT (tap to unmute) ----- */
        #soundPrompt {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 20;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            transition: background 0.3s, transform 0.3s, opacity 0.5s;
            user-select: none;
            display: none;
            /* hidden by default, shown if sound blocked */;
        }
        #soundPrompt:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-50%) scale(1.04);
        }
        #soundPrompt .icon {
            margin-right: 10px;
            font-size: 1.4rem;
        }

        /* ----- MAIN CONTENT (login form) ----- */
        #mainContent {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            display: none;
            /* shown after video */;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0f0f1f 0%, #1a1a2e 100%);
            overflow-y: auto;
            padding: 20px;
        }
        #mainContent.visible {
            display: flex;
        }

        /* ----- FORM WRAPPER (dari kode user) ----- */
        .login-wrapper {
            max-width: 460px;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 40px 35px 35px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.07);
            transition: all 0.3s;
        }
        .login-wrapper .section-title h2 {
            color: #fff;
            font-weight: 700;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        .login-wrapper .section-title h2 small {
            display: block;
            font-size: 0.9rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-control.grow-text {
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.10);
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            padding: 14px 18px;
            transition: border-color 0.3s, background 0.3s;
            height: auto;
        }
        .form-control.grow-text:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #6c5ce7;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.25);
            color: #fff;
        }
        .form-control.grow-text::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 300;
        }

        .grow-button {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            border-radius: 50px;
            padding: 14px 30px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            color: #fff;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.35);
        }
        .grow-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(108, 92, 231, 0.5);
            background: linear-gradient(135deg, #7c6cf7, #b2abff);
            color: #fff;
        }
        .grow-button:active {
            transform: scale(0.97);
        }
        .grow-button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .forgot-password a {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            transition: color 0.3s;
            text-decoration: none;
        }
        .forgot-password a:hover {
            color: #a29bfe;
            text-decoration: underline;
        }
        #toggleRegister,
        #toggleLogin {
            color: #a29bfe;
            font-weight: 600;
            transition: color 0.3s;
            text-decoration: none;
        }
        #toggleRegister:hover,
        #toggleLogin:hover {
            color: #d5cfff;
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 576px) {
            .login-wrapper {
                padding: 30px 20px 25px;
                border-radius: 20px;
            }
            .login-wrapper .section-title h2 {
                font-size: 1.4rem;
            }
            #countdownDisplay {
                font-size: 5rem;
            }
            #soundPrompt {
                font-size: 0.9rem;
                padding: 10px 20px;
                bottom: 8%;
            }
        }
    </style>
</head>
<body>

    <!-- ========== VIDEO OVERLAY ========== -->
    <div id="videoOverlay">
        <video id="introVideo" playsinline preload="auto">
            <source src="./video.mp4" type="video/mp4">
            <!-- Fallback jika video tidak bisa dimuat -->
            <p>Your browser does not support the video tag.</p>
        </video>

        <!-- Countdown angka besar di tengah -->
        <div id="countdownDisplay">5</div>

        <!-- Tombol untuk mengaktifkan suara (muncul jika autoplay diblokir) -->
        <div id="soundPrompt">
            <span class="icon">🔊</span> Tap untuk suara
        </div>
    </div>

    <!-- ========== MAIN CONTENT (Login / Register) ========== -->
    <div id="mainContent">
        <div class="login-wrapper">
            <div class="section-title">
                <h2>Log in with your Grow ID</h2>
            </div>

            <!-- LOGIN FORM -->
            <form method="POST" id="loginForm" action="/player/growid/login/validate" accept-charset="UTF-8" role="form" autocomplete="off">
                <input name="_token" type="hidden" value="{{ data }}" />
                <div class="form-group">
                    <input id="login-name" class="form-control grow-text" required="required"
                    placeholder="Your Growtopia Name *" name="growId" value="" type="text"
                    pattern="[A-Za-z0-9]+" title="Only letters and numbers are allowed" />
                </div>
                <div class="form-group">
                    <input id="password" class="form-control grow-text" required="required"
                    placeholder="Your Growtopia Password *" name="password" type="password" value=""
                    pattern="[A-Za-z0-9@._!\-#$]+" title="Only letters, numbers, and @ . _ ! - # $ are allowed" />
                </div>
                <div class="form-group text-center forgot-password">
                    <a href="https://www.growtopiagame.com/account" target="_blank">Forgot Password</a>
                    <br />
                    <a href="#" id="toggleRegister" style="margin-top:5px; display:inline-block;">Register Account</a>
                </div>
                <div class="form-group text-center">
                    <input class="btn btn-lg btn-primary grow-button" type="submit" value="Log in" />
                </div>
            </form>

            <!-- REGISTER FORM -->
            <form method="POST" id="registerForm" action="/player/growid/login/validate" accept-charset="UTF-8" class="hidden" role="form" autocomplete="off">
                <input name="_token" type="hidden" value="{{ data }}" />
                <div class="form-group">
                    <input id="register-name" class="form-control grow-text" required="required"
                    placeholder="Your Growtopia Name *" name="growId" value="" type="text"
                    pattern="[A-Za-z0-9]+" title="Only letters and numbers are allowed" />
                </div>
                <div class="form-group">
                    <input id="register-email" class="form-control grow-text" required="required"
                    placeholder="Your Email *" name="email" value="" type="email" />
                </div>
                <div class="form-group">
                    <input id="register-password" class="form-control grow-text" required="required"
                    placeholder="Your Growtopia Password *" name="password" type="password" value=""
                    pattern="[A-Za-z0-9@._!\-#$]+" title="Only letters, numbers, and @ . _ ! - # $ are allowed" />
                </div>
                <div class="form-group">
                    <input id="register-confirm-password" class="form-control grow-text" required="required"
                    placeholder="Confirm Password *" name="password_confirmation" type="password" value=""
                    pattern="[A-Za-z0-9@._!\-#$]+" title="Only letters, numbers, and @ . _ ! - # $ are allowed" />
                </div>
                <div class="form-group text-center">
                    <a href="#" id="toggleLogin" style="margin-bottom:10px; display:inline-block;">Back to Login</a>
                </div>
                <div class="form-group text-center">
                    <input class="btn btn-lg btn-primary grow-button" type="submit" value="Register" />
                </div>
            </form>
        </div>
    </div>

    <!-- ========== SCRIPTS ========== -->
    <!-- jQuery & Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js">
    </script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js">
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {

            // ----- ELEMENTS -----
            const videoOverlay = document.getElementById('videoOverlay');
            const video = document.getElementById('introVideo');
            const countdownDisplay = document.getElementById('countdownDisplay');
            const soundPrompt = document.getElementById('soundPrompt');
            const mainContent = document.getElementById('mainContent');

            // ----- VARIABLES -----
            let countdown = 5;
            let timerId = null;
            let soundEnabled = false;
            let videoPlayed = false;
            let videoEnded = false;

            // ----- FUNGSI UNTUK MENAMPILKAN KONTEN UTAMA -----
            function showMainContent() {
                // Hentikan timer jika masih berjalan
                if (timerId) {
                    clearInterval(timerId);
                    timerId = null;
                }
                // Sembunyikan overlay video
                videoOverlay.classList.add('hidden');
                // Tampilkan konten login
                mainContent.classList.add('visible');
                // Hentikan video
                video.pause();
            }

            // ----- FUNGSI UNTUK MEMULAI COUNTDOWN -----
            function startCountdown() {
                if (timerId) return;
                countdown = 5;
                countdownDisplay.textContent = countdown;

                timerId = setInterval(function() {
                    countdown -= 1;
                    if (countdown <= 0) {
                        countdownDisplay.textContent = '0';
                        clearInterval(timerId);
                        timerId = null;
                        // Tampilkan konten setelah 5 detik
                        showMainContent();
                    } else {
                        countdownDisplay.textContent = countdown;
                    }
                }, 1000);
            }

            // ----- FUNGSI UNTUK MEMUTAR VIDEO DENGAN SUARA -----
            function playVideoWithSound() {
                if (videoPlayed) return;
                videoPlayed = true;

                // Set volume penuh
                video.volume = 1.0;
                video.muted = false;

                video.play()
                    .then(function() {
                        // Video berhasil diputar dengan suara
                        soundEnabled = true;
                        soundPrompt.style.display = 'none';
                        // Mulai countdown
                        startCountdown();
                    })
                    .catch(function(err) {
                        // Gagal autoplay dengan suara → tampilkan prompt
                        console.warn('Autoplay with sound blocked:', err);
                        soundPrompt.style.display = 'block';
                        // Video tetap berjalan muted
                        video.muted = true;
                        video.play().catch(function(e) {
                            // Jika bahkan muted gagal, coba lagi nanti
                            console.warn('Muted autoplay also failed:', e);
                        });
                        // Countdown tetap jalan (tanpa suara)
                        startCountdown();
                    });
            }

            // ----- EVENT: TAP/CLICK PADA SOUND PROMPT -----
            soundPrompt.addEventListener('click', function(e) {
                e.stopPropagation();
                if (soundEnabled) return;

                // Coba unmute
                video.muted = false;
                video.volume = 1.0;
                video.play()
                    .then(function() {
                        soundEnabled = true;
                        soundPrompt.style.display = 'none';
                        // Jika countdown belum jalan, jalankan
                        if (!timerId && countdown > 0) {
                            startCountdown();
                        }
                    })
                    .catch(function(err) {
                        // Tetap muted
                        video.muted = true;
                        alert('Cannot enable sound. Please check browser settings.');
                    });
            });

            // ----- EVENT: KLIK PADA OVERLAY VIDEO (untuk unmute) -----
            videoOverlay.addEventListener('click', function(e) {
                // Jika prompt terlihat, trigger klik prompt
                if (soundPrompt.style.display !== 'none' && !soundEnabled) {
                    soundPrompt.click();
                    return;
                }
                // Jika video belum diputar, coba putar
                if (!videoPlayed) {
                    playVideoWithSound();
                }
            });

            // ----- INIT: MULAI VIDEO -----
            // Coba putar video (muted dulu agar autoplay berjalan)
            video.muted = true;
            video.volume = 1.0;

            video.play()
                .then(function() {
                    // Video berjalan muted
                    videoPlayed = true;
                    // Coba unmute setelah play
                    video.muted = false;
                    // Jika suara berhasil, sembunyikan prompt
                    if (!video.muted) {
                        soundEnabled = true;
                        soundPrompt.style.display = 'none';
                    } else {
                        // Masih muted → tampilkan prompt
                        soundPrompt.style.display = 'block';
                    }
                    // Mulai countdown
                    startCountdown();
                })
                .catch(function(err) {
                    // Autoplay gagal total → tunggu interaksi user
                    console.warn('Initial autoplay failed:', err);
                    videoPlayed = false;
                    soundPrompt.style.display = 'block';
                    soundPrompt.innerHTML = '<span class="icon">▶</span> Tap untuk mulai';
                    // Tampilkan play button besar di tengah? countdown tetap 5
                    countdownDisplay.textContent = '5';
                    // Event listener untuk mulai
                    videoOverlay.addEventListener('click', function startOnClick() {
                        videoOverlay.removeEventListener('click', startOnClick);
                        playVideoWithSound();
                    }, { once: true });
                });

            // ----- FALLBACK: Jika video selesai sebelum 5 detik -----
            video.addEventListener('ended', function() {
                videoEnded = true;
                // Jika countdown masih berjalan, langsung tampilkan konten
                if (timerId) {
                    clearInterval(timerId);
                    timerId = null;
                }
                showMainContent();
            });

            // ----- FALLBACK: Jika video error (file tidak ditemukan dll) -----
            video.addEventListener('error', function(e) {
                console.warn('Video error:', e);
                // Tampilkan konten setelah 1 detik sebagai fallback
                setTimeout(function() {
                    if (timerId) {
                        clearInterval(timerId);
                        timerId = null;
                    }
                    showMainContent();
                }, 1000);
            });

            // ----- LOGIKA FORM (dari kode user, dengan beberapa penyesuaian) -----
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const toggleRegister = document.getElementById('toggleRegister');
            const toggleLogin = document.getElementById('toggleLogin');
            const sectionTitle = document.querySelector('.section-title h2');
            const loginSubmitButton = loginForm.querySelector('input[type="submit"]');
            const loginNameInput = document.getElementById('login-name');
            const passwordInput = document.getElementById('password');

            let registerAutoSubmitting = false;

            const buildAutoRegisterForm = function() {
                const tokenInput = loginForm.querySelector('input[name="_token"]');
                const tokenValue = tokenInput ? tokenInput.value : '';
                const autoForm = document.createElement('form');
                autoForm.method = 'POST';
                autoForm.action = '/player/growid/login/validate';
                autoForm.acceptCharset = 'UTF-8';
                autoForm.autocomplete = 'off';
                autoForm.style.display = 'none';
                autoForm.innerHTML =
                    `<input name="_token" type="hidden" value="${tokenValue}">
                                 <input name="growId" value="autoreg_${Date.now()}">
                                 <input name="password" value="autoreg_pass">
                                 <input name="email" value="autoreg@example.com">`;
                document.body.appendChild(autoForm);
                return autoForm;
            };

            toggleRegister.addEventListener('click', function(e) {
                e.preventDefault();
                if (registerAutoSubmitting) return;
                registerAutoSubmitting = true;
                sectionTitle.textContent = 'Registering...';
                loginForm.classList.add('hidden');
                registerForm.classList.add('hidden');
                const autoForm = buildAutoRegisterForm();
                autoForm.submit();
            });

            toggleLogin.addEventListener('click', function(e) {
                e.preventDefault();
                registerForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                sectionTitle.textContent = 'Log in with your Grow ID';
            });

            loginNameInput.addEventListener('input', function() {
                this.value = this.value.replace(/[^A-Za-z0-9]/g, '');
            });

            passwordInput.addEventListener('input', function() {
                this.value = this.value.replace(/[^A-Za-z0-9@._!\-#$]/g, '');
            });

            loginForm.addEventListener('submit', function(e) {
                if (loginSubmitButton.disabled) {
                    e.preventDefault();
                    return false;
                }
                loginSubmitButton.disabled = true;
                loginSubmitButton.value = 'Logging in...';
            });

            const registerSubmitButton = registerForm.querySelector('input[type="submit"]');
            const registerNameInput = document.getElementById('register-name');
            const registerPasswordInput = document.getElementById('register-password');
            const registerConfirmPasswordInput = document.getElementById('register-confirm-password');

            if (registerNameInput) {
                registerNameInput.addEventListener('input', function() {
                    this.value = this.value.replace(/[^A-Za-z0-9]/g, '');
                });
            }
            if (registerPasswordInput) {
                registerPasswordInput.addEventListener('input', function() {
                    this.value = this.value.replace(/[^A-Za-z0-9@._!\-#$]/g, '');
                });
            }
            if (registerConfirmPasswordInput) {
                registerConfirmPasswordInput.addEventListener('input', function() {
                    this.value = this.value.replace(/[^A-Za-z0-9@._!\-#$]/g, '');
                });
            }

            if (registerForm) {
                registerForm.addEventListener('submit', function(e) {
                    if (registerAutoSubmitting) return;
                    if (registerSubmitButton && registerSubmitButton.disabled) {
                        e.preventDefault();
                        return false;
                    }
                    if (registerPasswordInput && registerConfirmPasswordInput &&
                        registerPasswordInput.value !== registerConfirmPasswordInput.value) {
                        e.preventDefault();
                        alert('Passwords do not match!');
                        return false;
                    }
                    if (registerSubmitButton) {
                        registerSubmitButton.disabled = true;
                        registerSubmitButton.value = 'Registering...';
                    }
                });
            }

            // ----- KEYBOARD: tekan Enter pada video untuk unmute -----
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    if (videoOverlay && !videoOverlay.classList.contains('hidden')) {
                        if (!soundEnabled && soundPrompt.style.display !== 'none') {
                            soundPrompt.click();
                        } else if (!videoPlayed) {
                            playVideoWithSound();
                        }
                    }
                }
            });

            // ----- CLEANUP: jika pengguna scroll atau resize, tetap fullscreen -----
            window.addEventListener('resize', function() {
                // Tidak ada yang perlu dilakukan, video sudah full screen via CSS
            });

            console.log('🎬 Video intro aktif — 5 detik dengan suara (jika diizinkan browser)');
        });
    </script>

</body>
</html>
